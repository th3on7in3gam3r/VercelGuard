name: VercelGuard Check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    name: Run VercelGuard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Run pre-deployment checks
        run: node dist/index.js check --skip-build --fail-on error
